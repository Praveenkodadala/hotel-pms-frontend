version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hotel_pms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-hotel_pms}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout:  5s
      retries:  10

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: hotel_pms_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./backend/.env.development
    environment:
      NODE_ENV:     development
      PORT:         4000
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      ${DB_NAME:-hotel_pms}
      DB_USER:      ${DB_USER:-postgres}
      DB_PASSWORD:  ${DB_PASSWORD:-postgres123}
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     development
    container_name: hotel_pms_ui
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # CRITICAL FIX: use 'backend' (Docker service name), not 'localhost'
      VITE_API_TARGET: http://backend:4000
      VITE_API_URL:    /api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hotel_pms_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@hotel.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
